<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUI STREAMING</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0f172a;
        color: white;
    }

    header {
        background-color: #020617;
        padding: 15px;
        text-align: center;
    }

    header img {
        width: 120px;
    }

    nav {
        background-color: #1e293b;
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 10px;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
    }

    nav a:hover {
        color: #38bdf8;
    }

    .container {
        padding: 20px;
        text-align: center;
    }

    .btn {
        background-color: #38bdf8;
        color: black;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn:hover {
        background-color: #0ea5e9;
    }

    .planos {
        margin-top: 40px;
    }

    .card {
        background-color: #1e293b;
        padding: 20px;
        margin: 10px auto;
        border-radius: 10px;
        width: 250px;
    }

    footer {
        background-color: #020617;
        text-align: center;
        padding: 10px;
        margin-top: 30px;
    }
</style>
</head>

<body>

<header>
    <img src="https://i.ibb.co/9HZkqLFm/1774251247979.png">
    <h1>RUI STREAMING</h1>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#planos">Planos</a>
    <a href="#">Contato</a>
</nav>

<div class="container">
    <h2>Bem-vindo ao RUI STREAMING</h2>
    <p>Os melhores canais, filmes e séries em um só lugar.</p>

    <button class="btn">Assista Agora</button>
</div>

<!-- PLANOS -->
<div id="planos" class="container planos">
    <h2>Escolha seu Plano</h2>

    <div class="card">
        <h3>Plano 1 Meses</h3>
        <p>R$ 25,00</p>
        <button class="btn">Comprar</button>
    </div>

  <div class="card">
        <h3>Plano 2 Meses</h3>
        <p>R$ 50,00</p>
        <button class="btn">Comprar</button>
    </div>
  
    <div class="card">
        <h3>Plano 3 Meses</h3>
        <p>R$ 65,00</p>
        <button class="btn">Comprar</button>
    </div>
</div>

<footer>
    <p>© 2026 RUI STREAMING</p>
</footer>

</body>
</html>
